name: notify-tick

# Polls Bluesky notifications every ~20 min per SPEC.md ARCHITECTURE.
# Classifies each new reply/mention: our own shared-account co-pilot gets
# an auto-posted in-voice banter reply; a stranger gets a DRAFT written to
# drafts.jsonl for operator approval (I-GATED-REPLIES — no autonomous
# public replies to strangers in v1).
on:
  schedule:
    - cron: "*/20 * * * *"   # best-effort FALLBACK only; GitHub cron lags 2-4h (SPEC-v5)
  workflow_dispatch: {}
  # RELIABLE HEARTBEAT (SPEC-v5): external scheduler → Vercel /api/heartbeat →
  # repository_dispatch fires this on a dependable ~15-min cadence (same event that
  # wakes scout-tick). I-TRIGGER-NOT-ACTION: only WAKES reply-detection; converse
  # triage + guard + human-gate still run.
  repository_dispatch:
    types: [heartbeat]

# Same rationale as post.yml: serialize runs so two ticks never race on the
# commit-back push, and never kill a run that may already have posted a
# banter reply to Bluesky before its state got logged.
concurrency:
  group: vibekoded-social-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run banter (notification poll)
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          GEN_MODEL: anthropic
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-haiku-4-5-20251001' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Conversation-continuation (converse.py): surface reply-backs via the
          # bot token so each carries a Slack ts and act_tick can gate on the 👍.
          # Falls back to webhook/print if the token isn't set (safe-degrade).
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # Multi-channel routing (SPEC-v3): converse reply-backs go to their own
          # channel. Channel ID is NOT secret -> safe default, overridable via repo
          # var; unset falls back to SLACK_CHANNEL_ID. (Bot must be invited there.)
          SLACK_CHANNEL_CONVERSE: ${{ vars.SLACK_CHANNEL_CONVERSE || 'C0BG2RQ7SF4' }}
          # The privacy guard runs on every drafted reply-back, fail-closed,
          # incl. client/project terms — a secret, never committed.
          GUARD_EXTRA_TERMS: ${{ secrets.GUARD_EXTRA_TERMS }}
          # Anti-spiral: max reply-backs proposed per thread. Tune without a push.
          CONVERSE_MAX_THREAD_DEPTH: ${{ vars.CONVERSE_MAX_THREAD_DEPTH || '3' }}
          # Ops-Insight Harvest (SPEC-v6): review-only lens over the reply/mention
          # stream (the deep-technical-exchange source). Posts briefs to the ops-intel
          # channel (bot must be invited). Never acts, never writes to the brain.
          SLACK_CHANNEL_OPS_INTEL: ${{ vars.SLACK_CHANNEL_OPS_INTEL || 'C0BGEB5FNGZ' }}
          OPS_INSIGHT_FLAG_MODEL: ${{ vars.OPS_INSIGHT_FLAG_MODEL || 'anthropic' }}
          OPS_INSIGHT_MODEL: ${{ vars.OPS_INSIGHT_MODEL }}          # optional stronger extract model id
          OPS_INSIGHT_MAX_PER_TICK: ${{ vars.OPS_INSIGHT_MAX_PER_TICK || '3' }}
          DRY_RUN: ${{ vars.DRY_RUN || '0' }}
        run: python banter.py

      - name: Commit updated state files
        # banter.py mutates handled.jsonl (dedup ledger), and may append to
        # drafts.jsonl (stranger replies awaiting approval) or posted.jsonl
        # is NOT touched here (banter replies aren't scheduled-drip posts,
        # they're tracked via handled.jsonl's own posted/drafted status).
        run: |
          git config user.name "vibekoded-social-bot"
          git config user.email "actions@users.noreply.github.com"
          # Stage the FULL state-file superset (not just this path's usual files):
          # the converse loop surfaces reply-backs into scout-surfaced.jsonl, so a
          # notify run can dirty a file the old list missed -> commit left it
          # unstaged -> `git pull --rebase` aborted (exit 128). Unchanged files are
          # no-ops on the ephemeral runner, so staging the superset is safe + atomic.
          git add content-queue.jsonl posted.jsonl skipped.jsonl handled.jsonl \
                  drafts.jsonl scout-state.json scout-seen.jsonl scout-surfaced.jsonl act-log.jsonl ops-insight-seen.jsonl frontier-followed.jsonl frontier-seen.jsonl
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(notify-tick): update notification state [skip ci]"
            # --autostash: belt so any stray unstaged change can never break the sync.
            git pull --rebase --autostash origin HEAD
            git push
          fi
