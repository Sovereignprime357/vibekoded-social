name: notify-tick

# Polls Bluesky notifications every ~20 min per SPEC.md ARCHITECTURE.
# Classifies each new reply/mention: our own shared-account co-pilot gets
# an auto-posted in-voice banter reply; a stranger gets a DRAFT written to
# drafts.jsonl for operator approval (I-GATED-REPLIES — no autonomous
# public replies to strangers in v1).
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

# Same rationale as post.yml: serialize runs so two ticks never race on the
# commit-back push, and never kill a run that may already have posted a
# banter reply to Bluesky before its state got logged.
concurrency:
  group: vibekoded-social-state
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run banter (notification poll)
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          GEN_MODEL: anthropic
          ANTHROPIC_MODEL: ${{ vars.ANTHROPIC_MODEL || 'claude-haiku-4-5-20251001' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Conversation-continuation (converse.py): surface reply-backs via the
          # bot token so each carries a Slack ts and act_tick can gate on the 👍.
          # Falls back to webhook/print if the token isn't set (safe-degrade).
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # Multi-channel routing (SPEC-v3): converse reply-backs go to their own
          # channel. Channel ID is NOT secret -> safe default, overridable via repo
          # var; unset falls back to SLACK_CHANNEL_ID. (Bot must be invited there.)
          SLACK_CHANNEL_CONVERSE: ${{ vars.SLACK_CHANNEL_CONVERSE || 'C0BG2RQ7SF4' }}
          # The privacy guard runs on every drafted reply-back, fail-closed,
          # incl. client/project terms — a secret, never committed.
          GUARD_EXTRA_TERMS: ${{ secrets.GUARD_EXTRA_TERMS }}
          # Anti-spiral: max reply-backs proposed per thread. Tune without a push.
          CONVERSE_MAX_THREAD_DEPTH: ${{ vars.CONVERSE_MAX_THREAD_DEPTH || '3' }}
          DRY_RUN: ${{ vars.DRY_RUN || '0' }}
        run: python banter.py

      - name: Commit updated state files
        # banter.py mutates handled.jsonl (dedup ledger), and may append to
        # drafts.jsonl (stranger replies awaiting approval) or posted.jsonl
        # is NOT touched here (banter replies aren't scheduled-drip posts,
        # they're tracked via handled.jsonl's own posted/drafted status).
        run: |
          git config user.name "vibekoded-social-bot"
          git config user.email "actions@users.noreply.github.com"
          git add handled.jsonl drafts.jsonl skipped.jsonl
          if git diff --cached --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "chore(notify-tick): update notification state [skip ci]"
            git pull --rebase origin HEAD
            git push
          fi
