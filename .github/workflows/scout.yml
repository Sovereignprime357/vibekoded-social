name: scout-tick

# The agentic SEE -> TRIAGE -> SURFACE loop (SPEC-v2.md). Runs hourly, scans
# Bluesky for on-mission posts, and surfaces the good ones to Slack for the
# operator's yes/no. It takes NO public action on its own (T1, human-gated),
# so an unattended run is harmless: worst case it prints to this log.
#
# Safe-degrade ladder (no risk at any rung):
#   - no GEMINI/GROQ key  -> triage uses its labelled stub (no real judgment,
#     but nothing is posted either).
#   - no SLACK webhook    -> surface prints to this Actions log instead of Slack.
#   - SCOUT_DRY_RUN=1 var  -> preview-only, side-effect-free (no state written).
# It becomes useful automatically once GEMINI_API_KEY + SLACK_WEBHOOK_URL exist.
on:
  schedule:
    - cron: "23 * * * *"   # hourly, offset to :23
  workflow_dispatch: {}     # run on demand from the Actions tab

# Never let two ticks race on the state commit-back. Don't cancel a tick
# mid-flight (it may have already surfaced items and needs to log them).
concurrency:
  group: vibekoded-social-scout-state
  cancel-in-progress: false

permissions:
  contents: write  # required to commit scout state files back

jobs:
  scout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scout_tick
        env:
          BSKY_HANDLE: ${{ secrets.BSKY_HANDLE }}
          BSKY_APP_PASSWORD: ${{ secrets.BSKY_APP_PASSWORD }}
          # Triage now defaults to paid Anthropic HAIKU. The free models proved
          # unusable for a scanner: Gemini free tier = 20 req/day, and Groq's
          # gpt-oss-120b returned empty output (reasoning bloat) + 429'd on the 8k
          # TPM cap. Batching keeps Haiku ~$2/mo. TRIAGE_MODEL can override back to
          # gemini|groq (their keys stay below as fallbacks).
          TRIAGE_MODEL: ${{ vars.TRIAGE_MODEL || 'anthropic' }}
          # Haiku key — REQUIRED for the default anthropic triage path. Without it,
          # triage honestly stubs ([stub: no ANTHROPIC_API_KEY set]) and surfaces
          # nothing. ANTHROPIC_MODEL default (claude-haiku-4-5) lives in generate.py.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Model IDs are perishable (Google killed gemini-2.0-flash 2026-06-01,
          # Groq killed llama-3.3-70b-versatile 2026-06-17). Overridable via repo
          # variables so the next deprecation is a variable change, not a code push.
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL || 'openai/gpt-oss-120b' }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Triage classifies candidates in BATCHES (rubric sent once per batch,
          # not once per post) to stay under the free tier's tokens/minute cap.
          # ~15 covers a full 60-candidate tick in ~4 calls; tune without a code push.
          SCOUT_TRIAGE_BATCH_SIZE: ${{ vars.SCOUT_TRIAGE_BATCH_SIZE || '15' }}
          # The comms + approval layer. Prefer the bot token (chat.postMessage)
          # so each surfaced message's `ts` is captured — that's the handle the
          # scout-act tick polls for the operator's 👍. Falls back to the legacy
          # incoming webhook if the bot token isn't set yet (those items carry no
          # ts and so aren't actionable — safe-degrade, scout still works).
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # Multi-channel routing (SPEC-v3): each scout action type gets its own
          # single-purpose channel. Channel IDs are NOT secret -> safe as defaults,
          # overridable via repo vars. Any unset var falls back to SLACK_CHANNEL_ID.
          # (Bot must be invited to each channel or posts fail not_in_channel.)
          SLACK_CHANNEL_LIKES: ${{ vars.SLACK_CHANNEL_LIKES || 'C0BFZGBNFEH' }}
          SLACK_CHANNEL_REPLIES: ${{ vars.SLACK_CHANNEL_REPLIES || 'C0BG4NSKSQZ' }}
          SLACK_CHANNEL_REPOSTS: ${{ vars.SLACK_CHANNEL_REPOSTS || 'C0BGX5UHJ0G' }}
          # Scout has its OWN pause switch, independent of post-tick's DRY_RUN,
          # so posting and scouting can be toggled separately. Set repo
          # variable SCOUT_DRY_RUN=1 for preview-only.
          DRY_RUN: ${{ vars.SCOUT_DRY_RUN || '0' }}
        run: python scout_tick.py

      - name: Commit updated scout state files
        # scout_tick mutates scout-state.json (last-scan marker),
        # scout-seen.jsonl (cross-run dedup ledger), and scout-surfaced.jsonl
        # (audit log, I-LOGGED). Commit whichever changed.
        run: |
          git config user.name "vibekoded-social-bot"
          git config user.email "actions@users.noreply.github.com"
          git add scout-state.json scout-seen.jsonl scout-surfaced.jsonl
          if git diff --cached --quiet; then
            echo "No scout state changes to commit."
          else
            git commit -m "chore(scout-tick): update scout state [skip ci]"
            git pull --rebase origin HEAD
            git push
          fi
